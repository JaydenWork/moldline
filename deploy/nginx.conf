# ============================================================
#  MOLDLINE — nginx 리버스 프록시 설정 예시
#  배치 위치(Ubuntu/Debian): /etc/nginx/sites-available/moldline
#  활성화: ln -s /etc/nginx/sites-available/moldline /etc/nginx/sites-enabled/
#  적용:   sudo nginx -t && sudo systemctl reload nginx
#
#  주의: 아래 ssl_certificate 경로는 certbot 실행 후 자동 생성됩니다.
#        TLS 발급 전이라면 80 블록만 두고 certbot을 먼저 실행하세요.
# ============================================================

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name moldline.kr www.moldline.kr;   # ← 실제 도메인으로 교체

    # Let's Encrypt 갱신용 (certbot webroot 사용 시)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 본 서버
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name moldline.kr www.moldline.kr;   # ← 실제 도메인으로 교체

    # certbot이 생성하는 인증서 경로
    ssl_certificate     /etc/letsencrypt/live/moldline.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moldline.kr/privkey.pem;

    # 권장 TLS 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ★ 대용량 도면(STP) 업로드 허용 — 개당 50MB 한도보다 여유있게
    client_max_body_size 60m;
    client_body_timeout 300s;

    # Node(server.js)로 프록시
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 관리자 페이지는 애플리케이션 Basic 인증으로 보호되지만,
    # 추가로 IP 화이트리스트를 두고 싶다면 아래 주석을 해제하세요.
    # location /admin {
    #     allow 203.0.113.10;   # 허용할 사무실 IP
    #     deny all;
    #     proxy_pass http://127.0.0.1:3000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
